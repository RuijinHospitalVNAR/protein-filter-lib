# Part 3 1ns 快速测试配置
# 用于验证多GPU并行和GPU分配策略

input:
  csv: ""
  dir: ""
  top_n: 8  # 测试8个结构，每个GPU分配1个

chains:
  target_chain: "A"
  binder_chain: "B"

physics:
  temperature: 298.15
  ph: 7.4
  ion_concentration: 0.154

md:
  production_ns: 1  # 1ns 快速测试
  npt_ns: 1
  interval: 5

forcefield: "amber99sb"

resources:
  n_gpu: 8
  gpu_ids: [0, 1, 2, 3, 4, 5, 6, 7]
  ntomp: 6

output:
  base_dir: ""
  run_id: ""
  structure_subdir: true

resume:
  enabled: false  # 测试时不启用resume
  rerun_failed: false
