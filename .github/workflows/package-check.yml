name: Package metadata and syntax check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  package-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install package (metadata only, no deps)
        run: |
          python -m pip install --upgrade pip
          pip install . --no-deps

      - name: Compile core package to bytecode (syntax check)
        run: |
          python -m compileall src/protein_filter
